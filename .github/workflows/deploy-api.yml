name: Deploy API to Fly

# Roda so quando algo em permuta-api/ muda (nao dispara em mudancas do app Flutter)
on:
  push:
    branches: [main]
    paths:
      - 'permuta-api/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    name: Deploy permuta-api
    runs-on: ubuntu-latest
    concurrency: deploy-cathira-api
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: flyctl deploy
        working-directory: permuta-api
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

# Permuta API — deploy no Fly.io
# Deploy a partir desta pasta:  fly deploy
app = "cathira"
primary_region = "gru"   # São Paulo

[build]
  dockerfile = "Dockerfile"

[env]
  ENV = "production"
  PORT = "8080"
  # DEV_MODE=true habilita POST /dev/login + /dev/seed + /dev/upload.
  # Mantido true enquanto os logins SMS/Google não estão plugados.
  # Quando ligar auth real, voltar pra "false" e fazer redeploy.
  DEV_MODE = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
